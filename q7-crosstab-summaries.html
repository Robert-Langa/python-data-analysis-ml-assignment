
<html>
<head>
    <title>Crosstab Summaries</title>
</head>
<body>
    <h2>Months by Duration</h2>
    <table border="1" class="dataframe">
  <thead>
    <tr style="text-align: right;">
      <th>duration</th>
      <th>15</th>
      <th>35</th>
      <th>45</th>
    </tr>
    <tr>
      <th>month</th>
      <th></th>
      <th></th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <th>Jan</th>
      <td>3</td>
      <td>2</td>
      <td>5</td>
    </tr>
    <tr>
      <th>Feb</th>
      <td>2</td>

    <tr>
      <th>Mar</th>
      <td>0</td>

</table>

  <thead>

      <th>month</th>

      <th>year</th>
      <th></th>
      <th></th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <th>2010</th>
      <td>4</td>

    <tr>
      <th>2011</th>
      <td>4</td>
      <td>2</td>
      <td>2</td>
    </tr>
    <tr>
      <th>2012</th>
      <td>2</td>
      <td>1</td>
      <td>1</td>
    </tr>
  </tbody>
</table>
</body>
</html>
